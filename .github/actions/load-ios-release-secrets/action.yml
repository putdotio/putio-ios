name: Load iOS release secrets
description: Load putio-ios release secrets from 1Password and materialize the App Store Connect key file

inputs:
  service-account-token:
    description: 1Password service account token
    required: true
  vault:
    description: 1Password vault selector
    required: true
  item:
    description: 1Password item selector
    required: true

runs:
  using: composite
  steps:
    - name: Require release secret inputs
      shell: bash
      run: |
        if [ -z "${{ inputs.service-account-token }}" ]; then
          echo "OP_SERVICE_ACCOUNT_TOKEN is not configured for this repository" >&2
          exit 1
        fi
        if [ -z "${{ inputs.vault }}" ] || [ -z "${{ inputs.item }}" ]; then
          echo "PUTIO_1PASSWORD_VAULT and PUTIO_1PASSWORD_ITEM must be configured as repository variables" >&2
          exit 1
        fi

    - name: Load shared iOS secrets from 1Password
      uses: 1password/load-secrets-action@v4
      with:
        export-env: true
      env:
        OP_SERVICE_ACCOUNT_TOKEN: ${{ inputs.service-account-token }}
        APPSTORE_CONNECT_ISSUER_ID: op://${{ inputs.vault }}/${{ inputs.item }}/APPSTORE_CONNECT_ISSUER_ID
        APPSTORE_CONNECT_KEY_ID: op://${{ inputs.vault }}/${{ inputs.item }}/APPSTORE_CONNECT_KEY_ID
        APPSTORE_CONNECT_KEY_CONTENT: op://${{ inputs.vault }}/${{ inputs.item }}/AuthKey.p8
        PUTIO_APP_IDENTIFIER: op://${{ inputs.vault }}/${{ inputs.item }}/PUTIO_APP_IDENTIFIER
        PUTIO_APPLE_ID: op://${{ inputs.vault }}/${{ inputs.item }}/PUTIO_APPLE_ID
        PUTIO_ITC_TEAM_ID: op://${{ inputs.vault }}/${{ inputs.item }}/PUTIO_ITC_TEAM_ID
        PUTIO_DEVELOPMENT_TEAM: op://${{ inputs.vault }}/${{ inputs.item }}/PUTIO_DEVELOPMENT_TEAM
        PUTIO_OAUTH_CLIENT_ID: op://${{ inputs.vault }}/${{ inputs.item }}/PUTIO_OAUTH_CLIENT_ID
        PUTIO_CHROMECAST_RECEIVER_APP_ID: op://${{ inputs.vault }}/${{ inputs.item }}/PUTIO_CHROMECAST_RECEIVER_APP_ID
        PUTIO_INTERCOM_API_KEY: op://${{ inputs.vault }}/${{ inputs.item }}/PUTIO_INTERCOM_API_KEY
        PUTIO_INTERCOM_APP_ID: op://${{ inputs.vault }}/${{ inputs.item }}/PUTIO_INTERCOM_APP_ID
        PUTIO_SENTRY_DSN: op://${{ inputs.vault }}/${{ inputs.item }}/PUTIO_SENTRY_DSN
        MATCH_GIT_URL: op://${{ inputs.vault }}/${{ inputs.item }}/MATCH_GIT_URL
        MATCH_TYPE: op://${{ inputs.vault }}/${{ inputs.item }}/MATCH_TYPE
        MATCH_PASSWORD: op://${{ inputs.vault }}/${{ inputs.item }}/MATCH_PASSWORD
        MATCH_GIT_PRIVATE_KEY_CONTENT: op://${{ inputs.vault }}/${{ inputs.item }}/MATCH_GIT_PRIVATE_KEY

    - name: Materialize App Store Connect key
      shell: bash
      run: |
        key_path="$RUNNER_TEMP/AuthKey.p8"
        printf '%s\n' "$APPSTORE_CONNECT_KEY_CONTENT" > "$key_path"
        chmod 600 "$key_path"
        echo "APPSTORE_CONNECT_KEY_FILEPATH=$key_path" >> "$GITHUB_ENV"

        if [ -z "${MATCH_GIT_PRIVATE_KEY_CONTENT:-}" ]; then
          echo "MATCH_GIT_PRIVATE_KEY is not configured in the selected 1Password item" >&2
          exit 1
        fi

        match_git_private_key_path="$RUNNER_TEMP/match-git-private-key"
        printf '%s\n' "$MATCH_GIT_PRIVATE_KEY_CONTENT" > "$match_git_private_key_path"
        chmod 600 "$match_git_private_key_path"
        echo "MATCH_GIT_PRIVATE_KEY=$match_git_private_key_path" >> "$GITHUB_ENV"

        match_git_host=""
        case "${MATCH_GIT_URL:-}" in
          git@*:*)
            match_git_host="${MATCH_GIT_URL#git@}"
            match_git_host="${match_git_host%%:*}"
            ;;
          ssh://*)
            match_git_host="${MATCH_GIT_URL#ssh://}"
            match_git_host="${match_git_host%%/*}"
            ;;
        esac

        if [ -n "$match_git_host" ]; then
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          touch "$HOME/.ssh/known_hosts"
          ssh-keyscan -H "$match_git_host" >> "$HOME/.ssh/known_hosts" 2>/dev/null || true
          chmod 600 "$HOME/.ssh/known_hosts"
        fi
