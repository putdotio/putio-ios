name: Load iOS release secrets
description: Load putio-ios release secrets from 1Password and materialize the App Store Connect key file

inputs:
  service-account-token:
    description: 1Password service account token
    required: true

runs:
  using: composite
  steps:
    - name: Require release secret inputs
      shell: bash
      run: |
        if [ -z "${{ inputs.service-account-token }}" ]; then
          echo "OP_SERVICE_ACCOUNT_TOKEN is not configured for this repository" >&2
          exit 1
        fi

    - name: Load shared iOS secrets from 1Password
      uses: 1password/load-secrets-action@92467eb28f72e8255933372f1e0707c567ce2259 # v4
      with:
        export-env: true
      env:
        OP_SERVICE_ACCOUNT_TOKEN: ${{ inputs.service-account-token }}
        APPSTORE_CONNECT_ISSUER_ID: op://frontend-ci/putio-ios/APPSTORE_CONNECT_ISSUER_ID
        APPSTORE_CONNECT_KEY_ID: op://frontend-ci/putio-ios/APPSTORE_CONNECT_KEY_ID
        APPSTORE_CONNECT_KEY_CONTENT: op://frontend-ci/putio-ios/AuthKey.p8
        PUTIO_APP_IDENTIFIER: op://frontend-ci/putio-ios/PUTIO_APP_IDENTIFIER
        PUTIO_APPLE_ID: op://frontend-ci/putio-ios/PUTIO_APPLE_ID
        PUTIO_ITC_TEAM_ID: op://frontend-ci/putio-ios/PUTIO_ITC_TEAM_ID
        PUTIO_DEVELOPMENT_TEAM: op://frontend-ci/putio-ios/PUTIO_DEVELOPMENT_TEAM
        PUTIO_OAUTH_CLIENT_ID: op://frontend-ci/putio-ios/PUTIO_OAUTH_CLIENT_ID
        PUTIO_CHROMECAST_RECEIVER_APP_ID: op://frontend-ci/putio-ios/PUTIO_CHROMECAST_RECEIVER_APP_ID
        PUTIO_INTERCOM_API_KEY: op://frontend-ci/putio-ios/PUTIO_INTERCOM_API_KEY
        PUTIO_INTERCOM_APP_ID: op://frontend-ci/putio-ios/PUTIO_INTERCOM_APP_ID
        PUTIO_SENTRY_DSN: op://frontend-ci/putio-ios/PUTIO_SENTRY_DSN
        MATCH_GIT_URL: op://frontend-ci/putio-ios/MATCH_GIT_URL
        MATCH_TYPE: op://frontend-ci/putio-ios/MATCH_TYPE
        MATCH_PASSWORD: op://frontend-ci/putio-ios/MATCH_PASSWORD
        MATCH_GIT_PRIVATE_KEY_CONTENT: op://frontend-ci/putio-ios/MATCH_GIT_PRIVATE_KEY

    - name: Materialize App Store Connect key
      shell: bash
      run: |
        key_path="$RUNNER_TEMP/AuthKey.p8"
        printf '%s\n' "$APPSTORE_CONNECT_KEY_CONTENT" > "$key_path"
        chmod 600 "$key_path"
        echo "APPSTORE_CONNECT_KEY_FILEPATH=$key_path" >> "$GITHUB_ENV"

        if [ -z "${MATCH_GIT_PRIVATE_KEY_CONTENT:-}" ]; then
          echo "MATCH_GIT_PRIVATE_KEY is not configured in the selected 1Password item" >&2
          exit 1
        fi

        match_git_private_key_path="$RUNNER_TEMP/match-git-private-key"
        printf '%s\n' "$MATCH_GIT_PRIVATE_KEY_CONTENT" > "$match_git_private_key_path"
        chmod 600 "$match_git_private_key_path"
        echo "MATCH_GIT_PRIVATE_KEY=$match_git_private_key_path" >> "$GITHUB_ENV"

        match_git_host=""
        case "${MATCH_GIT_URL:-}" in
          git@github.com:*)
            match_git_host="github.com"
            ;;
          ssh://git@github.com/* | ssh://github.com/*)
            match_git_host="github.com"
            ;;
        esac

        if [ -z "$match_git_host" ]; then
          echo "MATCH_GIT_URL must use a github.com SSH URL when MATCH_GIT_PRIVATE_KEY is used" >&2
          exit 1
        fi

        host_key_path="$RUNNER_TEMP/github-ed25519-known-hosts"
        ssh-keyscan -T 10 -t ed25519 "$match_git_host" > "$host_key_path" 2>/dev/null
        if [ ! -s "$host_key_path" ]; then
          echo "No SSH host key was returned for $match_git_host" >&2
          exit 1
        fi

        fingerprints="$(ssh-keygen -lf "$host_key_path" -E sha256 | awk '{print $2}' | sort -u)"
        fingerprint_count="$(printf '%s\n' "$fingerprints" | wc -l | tr -d ' ')"

        if [ "$fingerprint_count" != "1" ] || [ "$fingerprints" != "SHA256:+DiY3wvvV6TuJJhbpZisF/zLDA0zPMSvHdkr4UvCOqU" ]; then
          echo "Unexpected SSH host key for $match_git_host: $fingerprints" >&2
          exit 1
        fi

        mkdir -p "$HOME/.ssh"
        chmod 700 "$HOME/.ssh"
        cat "$host_key_path" >> "$HOME/.ssh/known_hosts"
        chmod 600 "$HOME/.ssh/known_hosts"
