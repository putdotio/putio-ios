name: E2E Simulator

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to test
        required: false
        default: ''

permissions:
  contents: read

concurrency:
  group: e2e-simulator-${{ inputs.ref || github.ref }}
  cancel-in-progress: true

jobs:
  e2e-simulator:
    name: Run mocked simulator e2e
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1
        with:
          xcode-version: latest-stable

      - name: Set up Ruby
        uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Restore CocoaPods cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/Library/Caches/CocoaPods
          key: ${{ runner.os }}-cocoapods-downloads-${{ github.workflow }}-${{ hashFiles('Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-cocoapods-downloads-${{ github.workflow }}-

      - name: Install CocoaPods dependencies
        run: make bootstrap-ci

      - name: Run mocked simulator e2e
        run: make e2e-simulator
