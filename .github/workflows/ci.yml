name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify iOS app
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Restore CocoaPods cache
        uses: actions/cache@v4
        with:
          path: |
            Pods
            ~/Library/Caches/CocoaPods
          key: ${{ runner.os }}-cocoapods-${{ github.workflow }}-${{ hashFiles('Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-cocoapods-${{ github.workflow }}-

      - name: Install CocoaPods dependencies
        run: make bootstrap

      - name: Verify repository
        run: make verify

  beta:
    name: Deploy beta build
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: macos-26
    timeout-minutes: 45
    env:
      OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_PUTIO_FRONTEND_CI }}

    steps:
      - name: Skip when 1Password CI token is not configured
        if: env.OP_SERVICE_ACCOUNT_TOKEN == ''
        run: echo "Skipping beta deploy because OP_SERVICE_ACCOUNT_PUTIO_FRONTEND_CI is not configured"

      - name: Check out repository
        if: env.OP_SERVICE_ACCOUNT_TOKEN != ''
        uses: actions/checkout@v6

      - name: Select latest stable Xcode
        if: env.OP_SERVICE_ACCOUNT_TOKEN != ''
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install 1Password CLI
        if: env.OP_SERVICE_ACCOUNT_TOKEN != ''
        uses: 1password/install-cli-action@v2

      - name: Set up Ruby
        if: env.OP_SERVICE_ACCOUNT_TOKEN != ''
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Restore CocoaPods cache
        if: env.OP_SERVICE_ACCOUNT_TOKEN != ''
        uses: actions/cache@v4
        with:
          path: |
            Pods
            ~/Library/Caches/CocoaPods
          key: ${{ runner.os }}-cocoapods-beta-${{ hashFiles('Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-cocoapods-beta-

      - name: Install CocoaPods dependencies
        if: env.OP_SERVICE_ACCOUNT_TOKEN != ''
        run: make bootstrap

      - name: Preflight beta secrets
        if: env.OP_SERVICE_ACCOUNT_TOKEN != ''
        id: beta_preflight
        run: |
          output=$(PUTIO_1PASSWORD_VAULT=frontend-ci PUTIO_1PASSWORD_ITEM=putio-ios op run --env-file=fastlane/.env.1password.template -- ruby -e '
            required = %w[
              APPSTORE_CONNECT_ISSUER_ID
              APPSTORE_CONNECT_KEY_ID
              APPSTORE_CONNECT_KEY_CONTENT
              PUTIO_APP_IDENTIFIER
              PUTIO_APPLE_ID
              PUTIO_ITC_TEAM_ID
              PUTIO_DEVELOPMENT_TEAM
              MATCH_GIT_URL
              MATCH_TYPE
              MATCH_PASSWORD
            ]
            missing = required.select { |key| ENV[key].to_s.empty? }
            if missing.empty?
              puts "ready=true"
              puts "missing="
            else
              puts "ready=false"
              puts "missing=#{missing.join(",")}"
            end
          ')
          printf '%s\n' "$output" >> "$GITHUB_OUTPUT"

      - name: Skip beta deploy until shared item is complete
        if: env.OP_SERVICE_ACCOUNT_TOKEN != '' && steps.beta_preflight.outputs.ready != 'true'
        run: echo "Skipping beta deploy because frontend-ci/putio-ios is still missing ${MISSING_FIELDS}"
        env:
          MISSING_FIELDS: ${{ steps.beta_preflight.outputs.missing }}

      - name: Upload beta build
        if: env.OP_SERVICE_ACCOUNT_TOKEN != '' && steps.beta_preflight.outputs.ready == 'true'
        run: make beta
