name: CI

on:
  pull_request:
    paths-ignore: &docs_only_ignore
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - 'CONTRIBUTING.md'
      - 'LICENSE'
      - 'README.md'
      - 'SECURITY.md'
      - 'docs/**'
      - 'fastlane/README.md'
  push:
    branches:
      - main
    paths-ignore: *docs_only_ignore

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify iOS app
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1
        with:
          xcode-version: latest-stable

      - name: Set up Ruby
        uses: ruby/setup-ruby@97ecb7b512899eb71ab1bf2310a624c6f1589ac6 # v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Restore CocoaPods cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/Library/Caches/CocoaPods
          key: ${{ runner.os }}-cocoapods-downloads-${{ github.workflow }}-${{ hashFiles('Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-cocoapods-downloads-${{ github.workflow }}-

      - name: Install CocoaPods dependencies
        run: make bootstrap-ci

      - name: Verify repository
        run: make verify
