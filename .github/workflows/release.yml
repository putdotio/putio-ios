name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build and upload
        required: false
        default: main
      version:
        description: Optional marketing version override
        required: false
        default: ''
      changelog:
        description: Optional TestFlight What to Test notes override
        required: false
        default: ''
      groups:
        description: Comma-separated TestFlight groups
        required: false
        default: ''

permissions:
  contents: read

concurrency:
  group: release-${{ github.event.release.tag_name || inputs.ref || 'main' }}
  cancel-in-progress: false

jobs:
  release:
    name: Upload release build
    runs-on: macos-26
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || inputs.ref }}

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Restore CocoaPods cache
        uses: actions/cache@v4
        with:
          path: |
            Pods
            ~/Library/Caches/CocoaPods
          key: ${{ runner.os }}-cocoapods-release-${{ hashFiles('Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-cocoapods-release-

      - name: Install CocoaPods dependencies
        run: make bootstrap

      - name: Verify repository
        run: make verify

      - name: Load shared release secrets
        uses: ./.github/actions/load-ios-release-secrets
        with:
          service-account-token: ${{ secrets.OP_SERVICE_ACCOUNT_PUTIO_FRONTEND_CI }}

      - name: Upload release build
        env:
          PUTIO_RELEASE_VERSION: ${{ inputs.version || github.event.release.tag_name }}
          PUTIO_RELEASE_GROUPS: ${{ inputs.groups }}
          PUTIO_RELEASE_DISTRIBUTE_EXTERNAL: false
          PUTIO_RELEASE_CHANGELOG_INPUT: ${{ inputs.changelog || github.event.release.body }}
        run: |
          export PUTIO_RELEASE_BUILD_NUMBER="$(date -u +%Y%m%d%H%M%S)"

          changelog="$PUTIO_RELEASE_CHANGELOG_INPUT"

          if [ -z "$changelog" ]; then
            release_ref="${{ github.event.release.tag_name || inputs.ref }}"
            short_sha="$(git rev-parse --short HEAD)"
            changelog="Release build ${PUTIO_RELEASE_BUILD_NUMBER} from ${release_ref} (${short_sha})"
          fi

          export PUTIO_RELEASE_CHANGELOG="$changelog"
          bundle exec fastlane release
