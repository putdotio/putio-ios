name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build and upload
        required: false
        default: main
      version:
        description: Release version to promote
        required: false
        default: ''
      build_number:
        description: Optional existing TestFlight build number to promote
        required: false
        default: ''

permissions:
  contents: read

concurrency:
  group: release-${{ github.event.release.tag_name || inputs.ref || 'main' }}
  cancel-in-progress: false

jobs:
  release:
    name: Promote release build
    runs-on: macos-26
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || inputs.ref }}

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Load shared release secrets
        uses: ./.github/actions/load-ios-release-secrets
        with:
          service-account-token: ${{ secrets.OP_SERVICE_ACCOUNT_PUTIO_FRONTEND_CI }}

      - name: Promote existing App Store Connect build
        env:
          PUTIO_RELEASE_VERSION: ${{ inputs.version || github.event.release.tag_name }}
          PUTIO_RELEASE_BUILD_NUMBER: ${{ inputs.build_number }}
        run: |
          bundle exec fastlane release
