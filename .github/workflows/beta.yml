name: Beta

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build and upload
        required: false
        default: main
      changelog:
        description: Optional TestFlight What to Test notes
        required: false
        default: ''
      groups:
        description: Comma-separated TestFlight groups
        required: false
        default: Beta

permissions:
  contents: read

concurrency:
  group: beta-${{ inputs.ref || 'main' }}
  cancel-in-progress: false

jobs:
  beta:
    name: Upload beta build
    runs-on: macos-26
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Restore CocoaPods cache
        uses: actions/cache@v4
        with:
          path: |
            Pods
            ~/Library/Caches/CocoaPods
          key: ${{ runner.os }}-cocoapods-${{ hashFiles('Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-cocoapods-

      - name: Install CocoaPods dependencies
        run: make bootstrap-ci

      - name: Verify repository
        run: make verify

      - name: Load shared release secrets
        uses: ./.github/actions/load-ios-release-secrets
        with:
          service-account-token: ${{ secrets.OP_SERVICE_ACCOUNT_PUTIO_FRONTEND_CI }}

      - name: Upload beta build
        env:
          PUTIO_BETA_CHANGELOG: ${{ inputs.changelog }}
          PUTIO_BETA_GROUPS: ${{ inputs.groups }}
          PUTIO_BETA_REF: ${{ inputs.ref }}
        run: |
          export PUTIO_BETA_BUILD_NUMBER="$(date -u +%Y%m%d%H%M%S)"

          if [ -z "$PUTIO_BETA_CHANGELOG" ]; then
            short_sha="$(git rev-parse --short HEAD)"
            export PUTIO_BETA_CHANGELOG="Manual beta build ${PUTIO_BETA_BUILD_NUMBER} from ${PUTIO_BETA_REF} (${short_sha})"
          fi

          bundle exec fastlane beta
